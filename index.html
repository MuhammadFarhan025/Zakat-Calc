<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Zakat Calculator 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h1 { color: #1b5e20; text-align: center; margin-top: 0; font-size: 30px; }
        .rate-info { background: #e8f5e9; padding: 12px; border-radius: 10px; font-size: 0.85em; margin-bottom: 20px; text-align: center; border: 1px solid #c8e6c9; color: #2e7d32; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #2e7d32; color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        #result { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; text-align: center; line-height: 1.6; font-weight: bold; }
        .fard { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .not-fard { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .note { margin-top: 25px; padding: 15px; background: #fffde7; border-radius: 8px; font-size: 0.85em; color: #5d4037; border: 1px solid #fff9c4; }
    </style>
</head>
<body>

<div class="card">
    <h1>Zakat Calculator</h1>
    
    <div class="rate-info">
        <b>Rates (May 13, 2026):</b><br>
        Gold: Rs. 510,000/Tola | Silver: Rs. 9,003/Tola<br>
        Silver Nisab: <b>Rs. 472,657</b>
    </div>

    <label>Gold Owned (Tolas)</label>
    <input type="number" id="gold" placeholder="0">

    <label>Silver Owned (Tolas)</label>
    <input type="number" id="silver" placeholder="0">

    <label>Cash & Savings (PKR)</label>
    <input type="number" id="cash" placeholder="0">

    <label>Debts to Pay (PKR)</label>
    <input type="number" id="debts" placeholder="0">

    <button onclick="calculate()">Check Now</button>

    <div id="result"></div>

    <div class="note">
        <b>Rule:</b> Zakat is Fard if you have 7.5 Tola Gold OR if your combined assets (Gold + Silver + Cash) exceed Rs. 472,657.
    </div>
</div>

<script>
    function calculate() {
        const GOLD_RATE = 510000;
        const SILVER_RATE = 9003;
        const SILVER_NISAB = 52.5 * SILVER_RATE; // Rs. 472,657

        const g = parseFloat(document.getElementById('gold').value) || 0;
        const s = parseFloat(document.getElementById('silver').value) || 0;
        const c = parseFloat(document.getElementById('cash').value) || 0;
        const d = parseFloat(document.getElementById('debts').value) || 0;

        const totalWealth = (g * GOLD_RATE) + (s * SILVER_RATE) + c - d;
        const res = document.getElementById('result');
        res.style.display = "block";

        let statusFard = false;

        // NEW STRICT LOGIC
        if (s === 0 && c === 0) {
            // ONLY Gold case
            if (g >= 7.5) statusFard = true;
        } else {
            // Mixed assets case (Silver or Cash is present)
            if (totalWealth >= SILVER_NISAB) statusFard = true;
        }

        if (statusFard) {
            res.className = "fard";
            res.innerHTML = "ZAKAT IS FARD<br>Payable Amount: Rs. " + (totalWealth * 0.025).toLocaleString();
        } else {
            res.className = "not-fard";
            res.innerHTML = "ZAKAT IS NOT FARD<br>Wealth is below threshold.";
        }
    }
</script>

</body>
</html>
